<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mi Primera WebAR · Said Gastelum</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
      color: #e0ff60;
      overflow: hidden;
    }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      pointer-events: none;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-title {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.7;
      line-height: 1.6;
    }

    .hud-title strong {
      display: block;
      font-size: 16px;
      letter-spacing: 0.1em;
      color: #e0ff60;
      opacity: 1;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e0ff60;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Instruction card ── */
    #instructions {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 24px 32px;
      background: linear-gradient(to top, rgba(10,10,15,0.95) 60%, transparent);
      pointer-events: none;
    }

    .card {
      border: 1px solid rgba(224,255,96,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      background: rgba(224,255,96,0.05);
      backdrop-filter: blur(8px);
      max-width: 420px;
      margin: 0 auto;
    }

    .card h2 {
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.6;
    }

    .card p {
      font-size: 14px;
      line-height: 1.7;
      opacity: 0.9;
    }

    .card .step {
      display: inline-block;
      background: #e0ff60;
      color: #0a0a0f;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: bold;
      margin-right: 4px;
    }

    /* ── Found! banner ── */
    #found-banner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      z-index: 200;
      background: rgba(224,255,96,0.12);
      border: 1px solid #e0ff60;
      border-radius: 16px;
      padding: 20px 36px;
      text-align: center;
      backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
    }

    #found-banner.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #found-banner p {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #found-banner .emoji { font-size: 36px; margin-bottom: 8px; }

    /* ── Audio button ── */
    #audio-btn {
      position: fixed;
      bottom: 140px; right: 24px;
      z-index: 150;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid #e0ff60;
      background: rgba(10,10,15,0.85);
      color: #e0ff60;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s;
    }

    #audio-btn:active { transform: scale(0.92); }
    #audio-btn.playing { background: rgba(224,255,96,0.15); }

    /* ── Corner brackets ── */
    .bracket {
      position: fixed;
      width: 32px; height: 32px;
      z-index: 50;
      opacity: 0.35;
    }
    .bracket.tl { top: 12px; left: 12px;
      border-top: 2px solid #e0ff60; border-left: 2px solid #e0ff60; }
    .bracket.tr { top: 12px; right: 12px;
      border-top: 2px solid #e0ff60; border-right: 2px solid #e0ff60; }
    .bracket.bl { bottom: 12px; left: 12px;
      border-bottom: 2px solid #e0ff60; border-left: 2px solid #e0ff60; }
    .bracket.br { bottom: 12px; right: 12px;
      border-bottom: 2px solid #e0ff60; border-right: 2px solid #e0ff60; }
  </style>
</head>
<body>

  <!-- Corner brackets (aesthetic) -->
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-title">
      <strong>WebAR · Said Gastelum</strong>
      <span><span class="status-dot"></span>Cámara activa</span>
    </div>
  </div>

  <!-- Instructions card -->
  <div id="instructions">
    <div class="card">
      <h2>Cómo usarlo</h2>
      <p>
        <span class="step">1</span> Imprime o abre en otra pantalla la imagen <code>target.png</code><br>
        <span class="step">2</span> Apunta la cámara a la imagen<br>
        <span class="step">3</span> ¡Verás el modelo 3D y escucharás el audio!
      </p>
    </div>
  </div>

  <!-- Found banner -->
  <div id="found-banner">
    <div class="emoji">🎯</div>
    <p>¡Imagen detectada!</p>
  </div>

  <!-- Audio toggle button -->
  <button id="audio-btn" title="Reproducir / Pausar audio">🔊</button>

  <!-- ═══════════════════════════════════════════
       A-FRAME SCENE  (todo el AR vive aquí)
  ═══════════════════════════════════════════ -->
  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
    style="position:fixed;top:0;left:0;width:100%;height:100%;"
  >

    <a-assets>
      <!-- 
        Modelo 3D: usamos un modelo gratuito de ejemplo.
        Para usar el tuyo: cambia la URL por tu archivo .glb
        (súbelo a GitHub Pages / Netlify primero)
      -->
      <a-asset-item
        id="model"
        src="https://cdn.jsdelivr.net/gh/nicktarnold/GLTF-models@master/Fox/Fox.glb">
      </a-asset-item>

      <!--
        Audio de bienvenida — usamos un MP3 de dominio público.
        Para poner el tuyo: sube el .mp3 y cambia el src.
      -->
      <audio
        id="ar-audio"
        src="https://www.soundjay.com/misc/sounds/magic-chime-02.mp3"
        preload="auto"
        crossorigin="anonymous">
      </audio>
    </a-assets>

    <!-- Cámara AR (la maneja MindAR, no la muevas) -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ── Target 0: tu imagen marcadora ── -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Modelo 3D centrado sobre la imagen -->
      <a-entity
        gltf-model="#model"
        position="0 0.1 0"
        scale="0.006 0.006 0.006"
        rotation="-90 0 0"
        animation="property: rotation; to: -90 360 0; loop: true; dur: 4000; easing: linear"
      ></a-entity>

      <!-- Plano de sombra decorativo debajo del modelo -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="1" height="1"
        color="#e0ff60"
        opacity="0.08"
        material="transparent: true"
      ></a-plane>

    </a-entity>

    <!-- Luces -->
    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" color="#e0ff60" intensity="0.8" position="1 3 2"></a-light>
    <a-light type="directional" color="#60aaff" intensity="0.4" position="-2 1 -1"></a-light>

  </a-scene>

  <!-- ═══════════════════════════════════════════
       JAVASCRIPT: lógica de eventos AR + audio
  ═══════════════════════════════════════════ -->
  <script>
    const banner    = document.getElementById('found-banner');
    const audioEl   = document.getElementById('ar-audio');
    const audioBtn  = document.getElementById('audio-btn');
    let   audioPlaying = false;

    // ── Funciones de audio ──
    function playAudio() {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
      audioPlaying = true;
      audioBtn.textContent = '🔇';
      audioBtn.classList.add('playing');
    }

    function stopAudio() {
      audioEl.pause();
      audioEl.currentTime = 0;
      audioPlaying = false;
      audioBtn.textContent = '🔊';
      audioBtn.classList.remove('playing');
    }

    audioBtn.addEventListener('click', () => {
      audioPlaying ? stopAudio() : playAudio();
    });

    // ── Eventos MindAR ──
    document.querySelector('a-scene').addEventListener('arReady', () => {
      console.log('✅ MindAR listo');
    });

    // Cuando se DETECTA la imagen
    document.querySelector('a-scene').addEventListener('targetFound', () => {
      console.log('🎯 Imagen encontrada');

      // Mostrar banner brevemente
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 2200);

      // Reproducir audio automáticamente
      playAudio();
    });

    // Cuando se PIERDE la imagen
    document.querySelector('a-scene').addEventListener('targetLost', () => {
      console.log('👻 Imagen perdida');
      stopAudio();
    });
  </script>

</body>
</html>
