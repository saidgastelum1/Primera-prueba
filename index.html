<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <!-- A-Frame 1.4.2 + MindAR 1.2.5 (versiones compatibles entre sí) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100%; height: 100%; }

    #msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 24px;
      z-index: 9999;
      text-align: center;
      width: 85%;
      pointer-events: none;
    }

    #btnAudio {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid white;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
    }

    #btnAudio.activo {
      background: rgba(224,255,96,0.3);
      border-color: #e0ff60;
      color: #e0ff60;
    }
  </style>
</head>
<body>

  <button id="btnAudio">🔇 Audio</button>
  <div id="msg">Apunta la cámara al marcador</div>

  <audio id="audio" src="audio.mp3" preload="auto" loop></audio>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <!-- targetIndex: 0 → primera imagen compilada en targets.mind -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box
        position="0 0 0"
        color="#e0ff60"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>
      <a-text
        value="¡Hola Said!"
        position="0 0.8 0"
        align="center"
        color="white"
        scale="1.5 1.5 1.5">
      </a-text>
    </a-entity>

  </a-scene>

  <script>
    const msg      = document.getElementById('msg');
    const audio    = document.getElementById('audio');
    const btnAudio = document.getElementById('btnAudio');
    let audioActivo = false;

    btnAudio.addEventListener('click', () => {
      audioActivo = !audioActivo;
      if (audioActivo) {
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(() => {});
        btnAudio.textContent = '🔊 Audio';
        btnAudio.classList.add('activo');
      } else {
        audio.pause();
        audio.currentTime = 0;
        btnAudio.textContent = '🔇 Audio';
        btnAudio.classList.remove('activo');
      }
    });

    // Esperar a que la escena esté lista antes de agregar listeners
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const target = document.querySelector('[mindar-image-target]');

      target.addEventListener('targetFound', () => {
        msg.textContent = '🎯 ¡Marcador detectado!';
        if (audioActivo) audio.play().catch(() => {});
      });

      target.addEventListener('targetLost', () => {
        msg.textContent = 'Apunta la cámara al marcador';
        audio.pause();
        audio.currentTime = 0;
      });
    });
  </script>

</body>
</html>
