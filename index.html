<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    #msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 24px;
      z-index: 9999;
      text-align: center;
      width: 85%;
    }
  </style>
</head>
<body>

  <div id="msg">Apunta la cámara al marcador</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >

    <!-- Marcador HIRO (para prueba) -->
    <a-marker preset="hiro">
      <a-box position="0 0.5 0" color="#e0ff60"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>
      <a-text value="Hiro" position="0 1.5 0" align="center" color="white" scale="2 2 2"></a-text>
    </a-marker>

    <!-- Tu marcador personalizado -->
    <a-marker type="pattern" url="marker.patt">
      <a-box position="0 0.5 0" color="#ff6060"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>
      <a-text value="¡Tu logo!" position="0 1.5 0" align="center" color="white" scale="2 2 2"></a-text>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const msg = document.getElementById('msg');

    document.querySelectorAll('a-marker').forEach(marker => {
      marker.addEventListener('markerFound', () => {
        msg.textContent = '🎯 ¡Marcador detectado!';
      });
      marker.addEventListener('markerLost', () => {
        msg.textContent = 'Apunta la cámara al marcador';
      });
    });
  </script>

</body>
</html>
