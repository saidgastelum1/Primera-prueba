<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    #instrucciones {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      font-family: sans-serif;
      font-size: 15px;
      padding: 12px 24px;
      border-radius: 20px;
      z-index: 9999;
      text-align: center;
      width: 80%;
    }
  </style>
</head>
<body style="margin:0; overflow:hidden;">

  <div id="instrucciones">
    📷 Apunta la cámara al marcador Hiro
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >

    <!-- Marcador HIRO (viene incluido en AR.js, no necesitas archivo extra) -->
    <a-marker preset="hiro">

      <!-- Cubo 3D girando -->
      <a-box
        position="0 0.5 0"
        scale="1 1 1"
        color="#e0ff60"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
      ></a-box>

      <!-- Texto encima -->
      <a-text
        value="¡Hola Said!"
        position="0 1.5 0"
        align="center"
        color="white"
        scale="2 2 2"
      ></a-text>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    // Cuando se detecta el marcador
    document.querySelector('a-marker').addEventListener('markerFound', () => {
      document.getElementById('instrucciones').textContent = '🎯 ¡Marcador detectado!';
    });

    document.querySelector('a-marker').addEventListener('markerLost', () => {
      document.getElementById('instrucciones').textContent = '📷 Apunta la cámara al marcador Hiro';
    });
  </script>

</body>
</html>
