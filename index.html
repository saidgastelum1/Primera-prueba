<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    #msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 24px;
      z-index: 9999;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="msg">Apunta la cámara al marcador</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >

    <a-marker type="pattern" url="marker.patt">

      <a-box
        position="0 0.5 0"
        color="#e0ff60"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
      ></a-box>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const msg = document.getElementById('msg');

    document.querySelector('a-marker').addEventListener('markerFound', () => {
      msg.textContent = '¡Marcador detectado!';
    });

    document.querySelector('a-marker').addEventListener('markerLost', () => {
      msg.textContent = 'Apunta la cámara al marcador';
    });
  </script>

</body>
</html>
