<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <!-- Versiones probadas y estables -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 18px;
      text-align: center;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      padding: 16px 24px;
      border-radius: 12px;
    }

    #msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      font-size: 15px;
      background: rgba(0,0,0,0.65);
      padding: 10px 22px;
      border-radius: 20px;
      z-index: 9999;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="status">⏳ Iniciando AR...</div>
  <div id="msg" style="display:none">📷 Apunta a tu imagen</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: false"
  >
    <a-assets>
      <a-asset-item id="fox" src="https://cdn.jsdelivr.net/gh/nicktarnold/GLTF-models@master/Fox/Fox.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        gltf-model="#fox"
        scale="0.005 0.005 0.005"
        position="0 0 0"
        rotation="-90 0 0"
        animation="property: rotation; to: -90 360 0; loop: true; dur: 3000; easing: linear"
      ></a-entity>
    </a-entity>

    <a-light type="ambient" color="#fff" intensity="2"></a-light>

  </a-scene>

  <script>
    const status = document.getElementById('status');
    const msg    = document.getElementById('msg');

    const scene = document.querySelector('a-scene');

    scene.addEventListener('loaded', () => {
      status.textContent = '✅ Listo — apunta a tu imagen';
      setTimeout(() => {
        status.style.display = 'none';
        msg.style.display = 'block';
      }, 2000);
    });

    scene.addEventListener('arError', (e) => {
      status.textContent = '❌ Error AR: ' + JSON.stringify(e.detail);
    });

    scene.addEventListener('targetFound', () => {
      msg.textContent = '🎯 ¡Detectado!';
    });

    scene.addEventListener('targetLost', () => {
      msg.textContent = '📷 Apunta a tu imagen';
    });
  </script>

</body>
</html>
