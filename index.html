<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR · Said Gastelum</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; }

    #msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 24px;
      z-index: 9999;
      text-align: center;
      width: 85%;
    }

    #btnAudio {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid white;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
    }

    #btnAudio.activo {
      background: rgba(224,255,96,0.3);
      border-color: #e0ff60;
      color: #e0ff60;
    }
  </style>
</head>
<body>

  <button id="btnAudio">🔇 Audio</button>
  <div id="msg">Apunta la cámara al marcador</div>

  <audio id="audio" src="audio.mp3" preload="auto"></audio>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >
    <a-marker type="pattern" url="marker.patt">
      <a-box position="0 0.5 0" color="#e0ff60"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>
      <a-text value="¡Hola Said!" position="0 1.5 0" align="center" color="white" scale="2 2 2"></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const msg      = document.getElementById('msg');
    const audio    = document.getElementById('audio');
    const btnAudio = document.getElementById('btnAudio');
    let audioActivo = false;

    btnAudio.addEventListener('click', () => {
      audioActivo = !audioActivo;
      if (audioActivo) {
        // Desbloquea el audio en celular
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(() => {});
        btnAudio.textContent = '🔊 Audio';
        btnAudio.classList.add('activo');
      } else {
        audio.pause();
        audio.currentTime = 0;
        btnAudio.textContent = '🔇 Audio';
        btnAudio.classList.remove('activo');
      }
    });

    document.querySelector('a-marker').addEventListener('markerFound', () => {
      msg.textContent = '🎯 ¡Marcador detectado!';
      if (audioActivo) audio.play().catch(() => {});
    });

    document.querySelector('a-marker').addEventListener('markerLost', () => {
      msg.textContent = 'Apunta la cámara al marcador';
      audio.pause();
      audio.currentTime = 0;
    });
  </script>

</body>
</html>
